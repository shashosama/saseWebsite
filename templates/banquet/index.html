{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SASE Annual Banquet 2026 — Friendship Gardens</title>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,400&family=Cinzel:wght@400;600&display=swap"
          rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #f0ece3;
            font-family: 'Cormorant Garamond', Georgia, serif;
            overflow-x: hidden;
        }

        /* ═══════════════════════════
           HERO
           ═══════════════════════════ */
        .hero {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 48px 24px 80px;
            position: relative;
        }

        /* Subtle radial depth on background */
        .hero::before {
            content: '';
            position: absolute;
            inset: 0;
            background:
                radial-gradient(ellipse 60% 55% at 68% 48%, rgba(160,190,215,0.13) 0%, transparent 70%),
                radial-gradient(ellipse 50% 45% at 28% 75%, rgba(190,175,155,0.10) 0%, transparent 60%);
            pointer-events: none;
        }

        /* ── Heading ── */
        .hero-heading {
            text-align: center;
            margin-bottom: 0px;
            z-index: 5;
        }
        .hero-heading h1 {
            font-family: 'Cinzel', serif;
            font-size: clamp(13px, 2.2vw, 22px);
            font-weight: 400;
            color: #6a5a48;
            letter-spacing: 0.28em;
            text-transform: uppercase;
        }
        .hero-heading .tagline {
            font-family: 'Great Vibes', cursive;
            font-size: clamp(34px, 5.5vw, 58px);
            color: #4a6e8a;
            margin-top: 2px;
            line-height: 1.1;
        }

        /* ═══════════════════════════
           ENVELOPE CARD — 3-D + shine
           ═══════════════════════════ */
        .envelope-card {
            position: relative;
            width: 100%;
            max-width: 680px;
            z-index: 10;

            /* Resting tilt */
            transform: perspective(1100px) rotateX(5deg) rotateY(-8deg) rotateZ(-1deg);

            /* Floating shadow */
            filter:
                drop-shadow(18px 26px 40px rgba(60, 40, 20, 0.22))
                drop-shadow(4px  8px  14px rgba(60, 40, 20, 0.13));

            transition:
                transform 0.55s cubic-bezier(0.25, 0.8, 0.25, 1),
                filter    0.55s ease;

            cursor: pointer;
        }

        .envelope-card svg {
            display: block;
            width: 100%;
            height: auto;
            overflow: visible;
        }

        /* ── Sweep-shine animation ── */
        @keyframes card-sweep {
            from { transform: skewX(-18deg) translateX(-800px); }
            to   { transform: skewX(-18deg) translateX(1600px); }
        }
        .sweep-rect {
            transform: skewX(-18deg) translateX(-800px);
        }
        .envelope-card:hover .sweep-rect {
            animation: card-sweep 0.85s cubic-bezier(0.4, 0, 0.2, 1) forwards;
            animation-delay: 0.04s;
        }

        /* ── RSVP button ── */
        .rsvp-btn {
            display: inline-block;
            margin-top: 42px;
            padding: 13px 46px;
            background: transparent;
            border: 1.5px solid #4a6e8a;
            color: #4a6e8a;
            font-family: 'Cinzel', serif;
            font-size: 12px;
            letter-spacing: 0.25em;
            text-transform: uppercase;
            text-decoration: none;
            border-radius: 2px;
            z-index: 5;
            transition: background 0.3s, color 0.3s;
        }
        .rsvp-btn:hover {
            background: #4a6e8a;
            color: #fff;
        }

        /* ── Scroll hint ── */
        .scroll-hint {
            position: absolute;
            bottom: 26px;
            left: 50%;
            transform: translateX(-50%);
            font-family: 'Cinzel', serif;
            font-size: 9px;
            letter-spacing: 0.3em;
            color: #b0a090;
            text-transform: uppercase;
            animation: bob 2.2s ease-in-out infinite;
        }
        @keyframes bob {
            0%, 100% { transform: translateX(-50%) translateY(0);   }
            50%       { transform: translateX(-50%) translateY(7px); }
        }

        /* ═══════════════════════════
           INVITED SECTION
           Elements are visible from the start. As the user scrolls through
           the section, BG layer (lacy card) drifts slowly; FG layer
           (polaroid + camera) moves faster — pure depth parallax.
           ═══════════════════════════ */
        .invited-section {
            position: relative;
            min-height: 180vh;
        }

        .invited-inner {
            position: sticky;
            top: 0;
            height: 100vh;
            overflow: hidden;
            background: #f0ece3;
        }

        .invited-inner::before {
            content: '';
            position: absolute;
            inset: 0;
            background:
                radial-gradient(ellipse 55% 50% at 32% 58%, rgba(190,175,155,0.10) 0%, transparent 65%),
                radial-gradient(ellipse 45% 50% at 72% 38%, rgba(160,190,215,0.09) 0%, transparent 60%);
            pointer-events: none;
        }

        /* ── Watermark ── */
        .invited-watermark {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate3d(-50%, -50%, 0);
            font-family: 'Great Vibes', cursive;
            font-size: clamp(64px, 12vw, 144px);
            color: rgba(74, 110, 138, 0.07);
            white-space: nowrap;
            pointer-events: none;
            z-index: 1;
            will-change: transform;
        }

        /* ── Lacy invitation card ── */
        .lacy-card {
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate3d(-60%, -50%, 0);
            width: clamp(230px, 27vw, 350px);
            z-index: 3;
            will-change: transform;
        }

        .lacy-frame {
            background: rgba(255, 253, 248, 0.95);
            border: 1px solid rgba(192, 180, 164, 0.55);
            box-shadow:
                0 0 0 7px rgba(255, 253, 248, 0.95),
                0 0 0 8px rgba(192, 180, 164, 0.32),
                inset 0 0 18px rgba(192, 180, 164, 0.08),
                0 22px 64px rgba(60, 40, 20, 0.13),
                0 6px 18px rgba(60, 40, 20, 0.08);
            border-radius: 2px;
            padding: 34px 30px;
            text-align: center;
            position: relative;
        }

        .lacy-frame::before, .lacy-frame::after {
            content: '';
            position: absolute;
            pointer-events: none;
            border-radius: 1px;
        }
        .lacy-frame::before {
            inset: 10px;
            border: 0.5px solid rgba(192, 180, 164, 0.38);
        }
        .lacy-frame::after {
            inset: 15px;
            border: 0.5px solid rgba(192, 180, 164, 0.18);
        }

        .lacy-corner {
            position: absolute;
            font-size: 14px;
            color: rgba(192, 180, 164, 0.72);
            line-height: 1;
        }
        .lacy-corner.tl { top: 19px; left: 21px; }
        .lacy-corner.tr { top: 19px; right: 21px; transform: scaleX(-1); }
        .lacy-corner.bl { bottom: 19px; left: 21px; transform: scaleY(-1); }
        .lacy-corner.br { bottom: 19px; right: 21px; transform: scale(-1); }

        .lacy-org {
            font-family: 'Cinzel', serif;
            font-size: 6px;
            letter-spacing: 0.26em;
            color: #b4a490;
            text-transform: uppercase;
            margin-bottom: 16px;
        }
        .lacy-you {
            font-family: 'Great Vibes', cursive;
            font-size: clamp(24px, 3.6vw, 40px);
            color: #6a5a48;
            line-height: 1.05;
        }
        .lacy-invited {
            font-family: 'Great Vibes', cursive;
            font-size: clamp(40px, 5.8vw, 62px);
            color: #4a6e8a;
            line-height: 1;
            margin-bottom: 14px;
        }
        .lacy-rule {
            display: flex;
            align-items: center;
            gap: 7px;
            margin: 8px 0;
        }
        .lacy-rule hr {
            flex: 1;
            height: 0;
            border: none;
            border-top: 0.5px solid #c0b4a4;
        }
        .lacy-rule .dia { font-size: 6px; color: #c0b4a4; }
        .lacy-event {
            font-family: 'Cormorant Garamond', Georgia, serif;
            font-size: 12px;
            color: #6a5a48;
            letter-spacing: 0.07em;
            margin-top: 6px;
        }
        .lacy-theme {
            font-family: 'Great Vibes', cursive;
            font-size: 20px;
            color: #4a6e8a;
            margin-top: 2px;
        }

        /* ── Polaroid ── */
        .polaroid {
            position: absolute;
            left: 9%;
            top: 50%;
            transform: translate3d(0, -46%, 0) rotate(-5deg);
            will-change: transform;
            width: clamp(140px, 16vw, 220px);
            background: #fefdf9;
            padding: 8px 8px 28px;
            box-shadow:
                3px 6px 26px rgba(60, 40, 20, 0.18),
                0 0 0 1px rgba(200, 192, 180, 0.22);
            z-index: 4;
        }
        .polaroid-photo {
            width: 100%;
            aspect-ratio: 1 / 1;
            background: linear-gradient(145deg, #c4d2dc 0%, #b4c4d2 50%, #a4b8c8 100%);
            position: relative;
            overflow: hidden;
        }
        .polaroid-photo::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(255,255,255,0.22) 0%, transparent 55%);
        }
        .polaroid-cap {
            font-family: 'Cormorant Garamond', Georgia, serif;
            font-size: 10px;
            font-style: italic;
            color: #9a8a78;
            text-align: center;
            margin-top: 9px;
            letter-spacing: 0.03em;
        }

        /* ── Digital Camera ── */
        .camera-wrap {
            position: absolute;
            right: 9%;
            top: 46%;
            transform: translate3d(0, -50%, 0) rotate(5deg);
            will-change: transform;
            width: clamp(130px, 18vw, 260px);
            z-index: 4;
        }
        .camera-svg {
            width: 100%;
            height: auto;
            filter: drop-shadow(4px 10px 24px rgba(60, 40, 20, 0.14));
        }

        /* ── Responsive: stack on small screens ── */
        @media (max-width: 640px) {
            .lacy-card   { left: 50%; width: 78vw; }
            .polaroid    { left: 5%; top: 30%; }
            .camera-wrap { right: 4%; top: 68%; }
        }
    </style>
</head>
<body>

<!-- ═══════════════════════════════════════════════════════
     HERO SECTION
     ═══════════════════════════════════════════════════════ -->
<section class="hero" id="hero">

    <div class="hero-heading">
        <h1>SASE Annual Banquet &nbsp;·&nbsp; 2026</h1>
        <p class="tagline">Friendship Gardens</p>
    </div>

    <!-- ─── 3-D Shiny Envelope Card ─── -->
    <div class="envelope-card" id="envelopeCard">
        <!--
            Card SVG 720 × 720 (square to match the user's 1024×1024 envelope art).
            The artwork fills the card; text + shine layers float above.
        -->
        <svg viewBox="0 0 720 720" xmlns="http://www.w3.org/2000/svg"
             xmlns:xlink="http://www.w3.org/1999/xlink" overflow="visible">
            <defs>

                <!-- Mouse-tracking radial gloss -->
                <radialGradient id="shine-radial" cx="50%" cy="50%" r="55%"
                                gradientUnits="objectBoundingBox">
                    <stop offset="0%"   stop-color="#fffff5" stop-opacity="0.55"/>
                    <stop offset="38%"  stop-color="#fffff5" stop-opacity="0.16"/>
                    <stop offset="100%" stop-color="#fffff5" stop-opacity="0"/>
                </radialGradient>

                <!-- Diagonal sweep band -->
                <linearGradient id="sweep-grad" x1="0%" y1="0%" x2="100%" y2="0%">
                    <stop offset="0%"   stop-color="white" stop-opacity="0"/>
                    <stop offset="43%"  stop-color="white" stop-opacity="0"/>
                    <stop offset="50%"  stop-color="white" stop-opacity="0.65"/>
                    <stop offset="57%"  stop-color="white" stop-opacity="0"/>
                    <stop offset="100%" stop-color="white" stop-opacity="0"/>
                </linearGradient>

                <!-- Static diagonal gloss (always-on laminate sheen) -->
                <linearGradient id="gloss-static" x1="15%" y1="0%" x2="72%" y2="100%">
                    <stop offset="0%"   stop-color="white" stop-opacity="0.42"/>
                    <stop offset="30%"  stop-color="white" stop-opacity="0.16"/>
                    <stop offset="50%"  stop-color="white" stop-opacity="0.04"/>
                    <stop offset="100%" stop-color="black" stop-opacity="0.06"/>
                </linearGradient>

                <!-- Holographic foil strip — diagonal rainbow band; angle shifts with tilt via JS -->
                <linearGradient id="holo-foil" gradientUnits="userSpaceOnUse"
                                x1="0" y1="180" x2="720" y2="540">
                    <stop offset="0%"   stop-color="#d4af37" stop-opacity="0.00"/>
                    <stop offset="28%"  stop-color="#d4af37" stop-opacity="0.00"/>
                    <stop offset="34%"  stop-color="#d4af37" stop-opacity="0.30"/>
                    <stop offset="39%"  stop-color="#48c9b0" stop-opacity="0.26"/>
                    <stop offset="44%"  stop-color="#c39bd3" stop-opacity="0.24"/>
                    <stop offset="49%"  stop-color="#7fb3d3" stop-opacity="0.26"/>
                    <stop offset="54%"  stop-color="#f9e79f" stop-opacity="0.22"/>
                    <stop offset="60%"  stop-color="#f9e79f" stop-opacity="0.00"/>
                    <stop offset="100%" stop-color="#f9e79f" stop-opacity="0.00"/>
                </linearGradient>

                <!-- Mask shine layers to the envelope's actual shape (alpha channel) -->
                <mask id="envelope-mask" maskUnits="userSpaceOnUse" style="mask-type: alpha">
                    <image href="{% static 'banquet/envelope.svg' %}"
                           x="0" y="0" width="720" height="720"
                           preserveAspectRatio="xMidYMid meet"/>
                </mask>

            </defs>

            <!-- ══════════════ ARTWORK ══════════════ -->
            <!--
                The user's 1024×1024 envelope/border illustration,
                scaled to fill the 720×720 card and clipped to rounded corners.
            -->
            <image href="{% static 'banquet/envelope.svg' %}"
                   x="0" y="0" width="720" height="720"
                   preserveAspectRatio="xMidYMid meet"/>

            <!-- ══════════════ EVENT DETAILS ══════════════ -->

            <!-- Top accent rule -->
            <line x1="180" y1="310" x2="540" y2="310"
                  stroke="#c0b4a4" stroke-width="0.8"/>
            <circle cx="360" cy="310" r="3.5" fill="#c0b4a4"/>

            <!-- Main script title -->
            <text x="360" y="368" text-anchor="middle"
                  font-family="'Great Vibes', cursive"
                  font-size="52" fill="#2c2018">SASE Banquet</text>

            <!-- Script subtitle in dusty blue -->
            <text x="360" y="413" text-anchor="middle"
                  font-family="'Great Vibes', cursive"
                  font-size="34" fill="#4a6e8a">Friendship Gardens</text>

            <!-- Diamond divider -->
            <line x1="210" y1="432" x2="346" y2="432"
                  stroke="#c0b4a4" stroke-width="0.7"/>
            <path d="M360,427 L366,432 L360,437 L354,432 Z" fill="#c0b4a4"/>
            <line x1="374" y1="432" x2="510" y2="432"
                  stroke="#c0b4a4" stroke-width="0.7"/>

            <!-- Location -->
            <text x="360" y="458" text-anchor="middle"
                  font-family="'Cormorant Garamond', Georgia, serif"
                  font-size="14.5" fill="#4a3828">
                Student Pavilion · Senita Ballroom BC
            </text>

            <!-- Date + Time -->
            <text x="360" y="482" text-anchor="middle"
                  font-family="'Cormorant Garamond', Georgia, serif"
                  font-size="14.5" fill="#4a3828">
                April 18<tspan baseline-shift="super" font-size="9">th</tspan>,
                2026 &nbsp;·&nbsp; 5:00 – 8:00 PM
            </text>

            <!-- Dress + RSVP -->
            <text x="360" y="506" text-anchor="middle"
                  font-family="'Cormorant Garamond', Georgia, serif"
                  font-size="13" font-style="italic" fill="#7a6a58">
                Semi-formal &nbsp;·&nbsp; Must RSVP
            </text>

            <!-- Bottom accent rule -->
            <line x1="180" y1="524" x2="540" y2="524"
                  stroke="#c0b4a4" stroke-width="0.8"/>
            <circle cx="360" cy="524" r="3.5" fill="#c0b4a4"/>

            <!-- ══════════════ SHINE LAYERS ══════════════ -->

            <!-- 1. Always-on diagonal laminate sheen -->
            <rect x="0" y="0" width="720" height="720"
                  fill="url(#gloss-static)"
                  mask="url(#envelope-mask)"
                  pointer-events="none"/>

            <!-- 1b. Holographic foil strip — angle shifts with card tilt via JS -->
            <rect x="0" y="0" width="720" height="720"
                  fill="url(#holo-foil)"
                  mask="url(#envelope-mask)"
                  pointer-events="none"/>

            <!-- 2. Mouse-tracking radial spotlight (JS updates cx/cy) -->
            <rect id="gloss-overlay"
                  x="0" y="0" width="720" height="720"
                  fill="url(#shine-radial)"
                  mask="url(#envelope-mask)"
                  pointer-events="none"/>

            <!-- 3. Hover sweep (CSS animation) -->
            <rect class="sweep-rect"
                  x="0" y="0" width="720" height="720"
                  fill="url(#sweep-grad)"
                  mask="url(#envelope-mask)"
                  pointer-events="none"/>

        </svg>
    </div><!-- /.envelope-card -->

    <a href="#rsvp" class="rsvp-btn">RSVP Now</a>

    <div class="scroll-hint">↓ &nbsp; scroll</div>

</section><!-- /#hero -->

<!-- ═══════════════════════════════════════════════════════
     INVITED SECTION
     ═══════════════════════════════════════════════════════ -->
<section class="invited-section" id="invited">
<div class="invited-inner">

    <div class="invited-watermark" aria-hidden="true">You Are Invited</div>

    <article class="lacy-card" aria-label="You are invited">
            <div class="lacy-frame">
                <span class="lacy-corner tl">❧</span>
                <span class="lacy-corner tr">❧</span>

                <span class="lacy-corner br">❧</span>

                <p class="lacy-invited">Invited</p>
                <div class="lacy-rule"><hr><span class="dia">◆</span><hr></div>
                <p class="lacy-event">Annual Banquet &nbsp;·&nbsp; 2026</p>
                <p class="lacy-theme">Friendship Gardens</p>
            </div>
        </article>

    <div class="polaroid">
            <div class="polaroid-photo"></div>
            <p class="polaroid-cap">/ sase banquet 2026</p>
        </div>

    <div class="camera-wrap">
            <svg class="camera-svg" viewBox="0 0 260 190" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                <!-- Camera body -->
                <rect x="5" y="44" width="250" height="141" rx="16"
                      fill="#e8e4de" stroke="#ccc6bc" stroke-width="1.4"/>
                <!-- Top grip -->
                <rect x="5" y="24" width="88" height="32" rx="10"

                <!-- Shutter button -->
                <ellipse cx="68" cy="22" rx="15" ry="8"
                         fill="#dad6cf" stroke="#bcb6ae" stroke-width="1.2"/>
                <!-- Mode dial -->
                <circle cx="202" cy="44" r="14"
                        fill="#d4d0ca" stroke="#bcb8b2" stroke-width="1.2"/>
                <text x="202" y="49" text-anchor="middle" font-size="8"
                      fill="#8a847c" font-family="'Courier New',monospace">A</text>
                <!-- Lens outer ring -->
                <circle cx="106" cy="117" r="58"
                        fill="#e0dcd6" stroke="#c4c0b8" stroke-width="1.4"/>
                <!-- Lens middle ring -->
                <circle cx="106" cy="117" r="46"
                        fill="#d8d4cc" stroke="#bab6ae" stroke-width="1"/>
                <!-- Lens inner ring -->
                <circle cx="106" cy="117" r="33"
                        fill="#ccc8c0"/>
                <!-- Lens glass -->
                <circle cx="106" cy="117" r="24"
                        fill="#252428"/>
                <!-- Lens highlight -->
                <circle cx="98" cy="109" r="5.5"

                <circle cx="114" cy="124" r="2.8"

                <!-- Flash housing -->
                <rect x="18" y="57" width="36" height="24" rx="5"
                      fill="#dedad4" stroke="#c2bcb4" stroke-width="1"/>
                <rect x="21" y="60" width="30" height="18" rx="3"
                      fill="#eae8e4"/>
                <!-- Viewfinder -->
                <rect x="182" y="55" width="42" height="28" rx="5"
                      fill="#dad6d0" stroke="#bebab4" stroke-width="1"/>
                <!-- Strap lugs -->
                <rect x="1" y="72" width="7" height="22" rx="3.5"
                      fill="#cac6be"/>
                <rect x="252" y="72" width="7" height="22" rx="3.5"
                      fill="#cac6be"/>
                <!-- Brand text -->
                <text x="174" y="158" text-anchor="end" font-size="6.5"
                      fill="#aaa49c" font-family="'Cinzel',serif" letter-spacing="2.5">SASE</text>
            </svg>
        </div>

</div><!-- /.invited-inner -->
</section><!-- /#invited -->

<script>
/*
 * ENVELOPE CARD INTERACTIVITY
 * ─────────────────────────────────────────────────────
 *  • Mouse-tracking 3-D tilt  (rotateX / rotateY)
 *  • Radial shine spotlight   (SVG radialGradient cx/cy)
 *  • Dynamic shadow shift     (drop-shadow follows tilt)
 *  • Smooth return on leave   (CSS transition re-enabled)
 */
(function () {
    const card  = document.getElementById('envelopeCard');
    const shine = document.getElementById('shine-radial');
    const foil  = document.getElementById('holo-foil');

    const REST_TRANSFORM =
        'perspective(1100px) rotateX(5deg) rotateY(-8deg) rotateZ(-1deg)';
    const REST_FILTER =
        'drop-shadow(18px 26px 40px rgba(60,40,20,0.22)) ' +
        'drop-shadow(4px  8px  14px rgba(60,40,20,0.13))';
    const SLOW_TRANSITION =
        'transform 0.55s cubic-bezier(0.25,0.8,0.25,1), filter 0.55s ease';

    card.addEventListener('mouseenter', function () {
        card.style.transition = 'filter 0.12s ease';
    });

    card.addEventListener('mousemove', function (e) {
        const r = card.getBoundingClientRect();
        const x = (e.clientX - r.left) / r.width;
        const y = (e.clientY - r.top)  / r.height;

        const rX = (5  + (y - 0.5) * -12).toFixed(1);
        const rY = (-8 + (x - 0.5) *  20).toFixed(1);

        card.style.transform =
            `perspective(1100px) rotateX(${rX}deg) rotateY(${rY}deg) rotateZ(-1deg)`;

        shine.setAttribute('cx', (x * 100).toFixed(1) + '%');
        shine.setAttribute('cy', (y * 100).toFixed(1) + '%');

        /* Rotate holographic foil gradient angle with card tilt */
        const tilt = (45 + parseFloat(rY) * 1.8 + parseFloat(rX) * 0.6) * Math.PI / 180;
        const r2 = 390;
        foil.setAttribute('x1', (360 - r2 * Math.cos(tilt)).toFixed(0));
        foil.setAttribute('y1', (360 + r2 * Math.sin(tilt)).toFixed(0));
        foil.setAttribute('x2', (360 + r2 * Math.cos(tilt)).toFixed(0));
        foil.setAttribute('y2', (360 - r2 * Math.sin(tilt)).toFixed(0));

        const sX = (8  + x * 20).toFixed(0);
        const sY = (14 + y * 18).toFixed(0);
        card.style.filter =
            `drop-shadow(${sX}px ${sY}px 38px rgba(60,40,20,0.25)) ` +
            `drop-shadow(3px 6px 12px rgba(60,40,20,0.13))`;
    });

    card.addEventListener('mouseleave', function () {
        card.style.transition = SLOW_TRANSITION;
        card.style.transform  = REST_TRANSFORM;
        card.style.filter     = REST_FILTER;
        shine.setAttribute('cx', '50%');
        shine.setAttribute('cy', '50%');
        foil.setAttribute('x1', '0');
        foil.setAttribute('y1', '180');
        foil.setAttribute('x2', '720');
        foil.setAttribute('y2', '540');
    });
}());

/*
 * INVITED SECTION — depth parallax
 * Elements are visible immediately. As you scroll through the section
 * each layer drifts at a different speed, creating depth:
 *   BG (lacy card + watermark) → barely moves  → feels far/still
 *   FG (polaroid + camera)     → drifts faster → feels close
 */
(function () {
    const section   = document.getElementById('invited');
    if (!section) return;

    const watermark = section.querySelector('.invited-watermark');
    const lacy      = section.querySelector('.lacy-card');
    const polaroid  = section.querySelector('.polaroid');
    const camera    = section.querySelector('.camera-wrap');

    let rafId = null;

    function update() {
        rafId = null;
        const scrolled = Math.max(0, -section.getBoundingClientRect().top);

        /* BG layer — 12% of scroll speed (nearly stationary) */
        const bgY = -(scrolled * 0.12);
        watermark.style.transform = `translate3d(-50%, calc(-50% + ${bgY.toFixed(1)}px), 0)`;
        lacy.style.transform      = `translate3d(-60%, calc(-50% + ${bgY.toFixed(1)}px), 0)`;

        /* FG layer — 40% of scroll speed (drifts upward noticeably) */
        const polY = -(scrolled * 0.40);
        polaroid.style.transform  = `translate3d(0, calc(-46% + ${polY.toFixed(1)}px), 0) rotate(-5deg)`;
        camera.style.transform    = `translate3d(0, calc(-50% + ${polY.toFixed(1)}px), 0) rotate(5deg)`;
    }

    function onScroll() {
        if (!rafId) rafId = requestAnimationFrame(update);
    }

    window.addEventListener('scroll', onScroll, { passive: true });
    window.addEventListener('resize', onScroll, { passive: true });
    update();
}());

</script>
