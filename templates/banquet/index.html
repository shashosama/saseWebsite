{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SASE Annual Banquet 2026 — Friendship Gardens</title>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,400&family=Cinzel:wght@400;600&display=swap"
          rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #f0ece3;
            font-family: 'Cormorant Garamond', Georgia, serif;
            overflow-x: hidden;
        }

        /* ═══════════════════════════
           HERO
           ═══════════════════════════ */
        .hero {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 48px 24px 80px;
            position: relative;
        }

        /* Subtle radial depth on background */
        .hero::before {
            content: '';
            position: absolute;
            inset: 0;
            background:
                radial-gradient(ellipse 60% 55% at 68% 48%, rgba(160,190,215,0.13) 0%, transparent 70%),
                radial-gradient(ellipse 50% 45% at 28% 75%, rgba(190,175,155,0.10) 0%, transparent 60%);
            pointer-events: none;
        }

        /* ── Heading ── */
        .hero-heading {
            text-align: center;
            margin-bottom: 38px;
            z-index: 5;
        }
        .hero-heading h1 {
            font-family: 'Cinzel', serif;
            font-size: clamp(13px, 2.2vw, 22px);
            font-weight: 400;
            color: #6a5a48;
            letter-spacing: 0.28em;
            text-transform: uppercase;
        }
        .hero-heading .tagline {
            font-family: 'Great Vibes', cursive;
            font-size: clamp(34px, 5.5vw, 58px);
            color: #4a6e8a;
            margin-top: 2px;
            line-height: 1.1;
        }

        /* ═══════════════════════════
           ENVELOPE CARD — 3-D + shine
           ═══════════════════════════ */
        .envelope-card {
            position: relative;
            width: 100%;
            max-width: 720px;
            z-index: 10;

            /* Resting tilt */
            transform: perspective(1100px) rotateX(5deg) rotateY(-8deg) rotateZ(-1deg);

            /* Floating shadow */
            filter:
                drop-shadow(18px 26px 40px rgba(60, 40, 20, 0.22))
                drop-shadow(4px  8px  14px rgba(60, 40, 20, 0.13));

            transition:
                transform 0.55s cubic-bezier(0.25, 0.8, 0.25, 1),
                filter    0.55s ease;

            cursor: pointer;
        }

        .envelope-card svg {
            display: block;
            width: 100%;
            height: auto;
            overflow: visible;
        }

        /* ── Sweep-shine animation ── */
        @keyframes card-sweep {
            from { transform: skewX(-18deg) translateX(-800px); }
            to   { transform: skewX(-18deg) translateX(1600px); }
        }
        .sweep-rect {
            transform: skewX(-18deg) translateX(-800px);
        }
        .envelope-card:hover .sweep-rect {
            animation: card-sweep 0.85s cubic-bezier(0.4, 0, 0.2, 1) forwards;
            animation-delay: 0.04s;
        }

        /* ── RSVP button ── */
        .rsvp-btn {
            display: inline-block;
            margin-top: 42px;
            padding: 13px 46px;
            background: transparent;
            border: 1.5px solid #4a6e8a;
            color: #4a6e8a;
            font-family: 'Cinzel', serif;
            font-size: 12px;
            letter-spacing: 0.25em;
            text-transform: uppercase;
            text-decoration: none;
            border-radius: 2px;
            z-index: 5;
            transition: background 0.3s, color 0.3s;
        }
        .rsvp-btn:hover {
            background: #4a6e8a;
            color: #fff;
        }

        /* ── Scroll hint ── */
        .scroll-hint {
            position: absolute;
            bottom: 26px;
            left: 50%;
            transform: translateX(-50%);
            font-family: 'Cinzel', serif;
            font-size: 9px;
            letter-spacing: 0.3em;
            color: #b0a090;
            text-transform: uppercase;
            animation: bob 2.2s ease-in-out infinite;
        }
        @keyframes bob {
            0%, 100% { transform: translateX(-50%) translateY(0);   }
            50%       { transform: translateX(-50%) translateY(7px); }
        }
    </style>
</head>
<body>

<!-- ═══════════════════════════════════════════════════════
     HERO SECTION
     ═══════════════════════════════════════════════════════ -->
<section class="hero" id="hero">

    <div class="hero-heading">
        <h1>SASE Annual Banquet &nbsp;·&nbsp; 2026</h1>
        <p class="tagline">Friendship Gardens</p>
    </div>

    <!-- ─── 3-D Shiny Envelope Card ─── -->
    <div class="envelope-card" id="envelopeCard">
        <!--
            SVG viewBox  0 0 720 410
            ─────────────────────────────────────────────────
            Left stub    x  0 – 68   (ticket perforated edge)
            Main body    x 68 – 720
            Flap         top triangle, apex at (394, 162)
            Fold lines   bottom V, meeting at (394, 248)
            Content zone y 175 – 390
        -->
        <svg viewBox="0 0 720 410" xmlns="http://www.w3.org/2000/svg" overflow="visible">
            <defs>

                <!-- Mouse-tracking radial gloss -->
                <radialGradient id="shine-radial" cx="50%" cy="50%" r="55%"
                                gradientUnits="objectBoundingBox">
                    <stop offset="0%"   stop-color="#fffff5" stop-opacity="0.60"/>
                    <stop offset="38%"  stop-color="#fffff5" stop-opacity="0.18"/>
                    <stop offset="100%" stop-color="#fffff5" stop-opacity="0"/>
                </radialGradient>

                <!-- Diagonal sweep band -->
                <linearGradient id="sweep-grad" x1="0%" y1="0%" x2="100%" y2="0%">
                    <stop offset="0%"   stop-color="white" stop-opacity="0"/>
                    <stop offset="43%"  stop-color="white" stop-opacity="0"/>
                    <stop offset="50%"  stop-color="white" stop-opacity="0.70"/>
                    <stop offset="57%"  stop-color="white" stop-opacity="0"/>
                    <stop offset="100%" stop-color="white" stop-opacity="0"/>
                </linearGradient>

                <!-- Static diagonal gloss (always-on laminate sheen) -->
                <linearGradient id="gloss-static" x1="0%" y1="0%" x2="90%" y2="100%">
                    <stop offset="0%"   stop-color="white" stop-opacity="0.18"/>
                    <stop offset="40%"  stop-color="white" stop-opacity="0.06"/>
                    <stop offset="55%"  stop-color="white" stop-opacity="0.01"/>
                    <stop offset="100%" stop-color="black" stop-opacity="0.04"/>
                </linearGradient>

                <!-- Clip entire card -->
                <clipPath id="card-clip">
                    <rect x="0" y="0" width="720" height="410" rx="9"/>
                </clipPath>

                <!-- Clip to envelope body (excl. stub) for inner border -->
                <clipPath id="body-clip">
                    <rect x="68" y="0" width="652" height="410"/>
                </clipPath>
            </defs>

            <!-- ══════════════ CARD BASE ══════════════ -->

            <!-- Left stub (warm parchment) -->
            <rect x="0" y="0" width="68" height="410" fill="#ede8de"
                  clip-path="url(#card-clip)"/>

            <!-- Main body (ivory) -->
            <rect x="68" y="0" width="652" height="410" fill="#faf8f2"
                  clip-path="url(#card-clip)"/>

            <!-- Full rounded border -->
            <rect x="0" y="0" width="720" height="410" rx="9"
                  fill="none" stroke="#c6bcb0" stroke-width="1.6"/>

            <!-- Inner dashed border (body only) -->
            <rect x="80" y="10" width="630" height="390" rx="5"
                  fill="none" stroke="#d4ccbe" stroke-width="0.6"
                  stroke-dasharray="3,6"
                  clip-path="url(#body-clip)"/>

            <!-- ══════════════ PERFORATED STUB EDGE ══════════════ -->
            <!-- Top notch cut-out -->
            <circle cx="68" cy="0"   r="15" fill="#f0ece3"/>
            <!-- Bottom notch cut-out -->
            <circle cx="68" cy="410" r="15" fill="#f0ece3"/>
            <!-- Perforation dashes -->
            <line x1="68" y1="15" x2="68" y2="395"
                  stroke="#c0b8a8" stroke-width="1.1" stroke-dasharray="5,4.5"/>

            <!-- ══════════════ STUB TEXT ══════════════ -->
            <text transform="rotate(-90) translate(-200, 34)"
                  text-anchor="middle"
                  font-family="'Courier New', monospace" font-size="8"
                  fill="#a09080" letter-spacing="2.5">0 0 0 0 0 0 1</text>

            <text transform="rotate(-90) translate(-205, 34)"
                  dy="-130"
                  text-anchor="middle"
                  font-family="'Courier New', monospace" font-size="9"
                  fill="#7a6a58" letter-spacing="3">ADMIT ONE</text>

            <text transform="rotate(-90) translate(-340, 34)"
                  text-anchor="middle"
                  font-family="'Courier New', monospace" font-size="7.5"
                  fill="#a09080" letter-spacing="2">APR · 2026</text>

            <!-- ══════════════ ENVELOPE FLAP ══════════════ -->
            <!-- Flap fill (slightly warmer than body) -->
            <polygon points="68,0 720,0 394,162"
                     fill="#f2ede3" clip-path="url(#card-clip)"/>
            <!-- Flap fold edge lines -->
            <polyline points="68,0 394,162 720,0"
                      fill="none" stroke="#c6bcb0" stroke-width="1.2"/>

            <!-- ══════════════ EMBOSSED FLORAL ON FLAP ══════════════ -->
            <!--
                All paths are drawn in a tone just slightly off from the flap fill
                to create a subtle embossed / letterpress look.
            -->
            <g fill="none" stroke="#d8d0c2" stroke-width="0.95"
               stroke-linecap="round" stroke-linejoin="round" opacity="0.9">

                <!-- Centre flower at flap apex -->
                <path d="M394,18 Q391,30 389,44 Q387,54 391,59 Q393,62 394,59 Q395,62 397,59 Q401,54 399,44 Q397,30 394,18"/>
                <circle cx="394" cy="64" r="5" fill="#e6dfd4" stroke="#ccc4b8" stroke-width="0.8"/>

                <!-- Stem down from flower -->
                <path d="M394,69 Q392,76 390,83 Q388,92 394,96 Q400,92 398,83 Q396,76 394,69"/>

                <!-- Left main branch -->
                <path d="M388,58 C374,54 358,60 342,54 C326,48 316,36 320,27
                          C324,18 336,18 342,25 C348,32 344,44 352,48 C360,52 372,50 382,55"/>
                <!-- Left branch detail leaves -->
                <path d="M342,54 Q335,43 339,34"/>
                <path d="M328,46 Q320,39 323,30"/>
                <path d="M352,48 Q354,37 363,33"/>
                <!-- Left far scroll -->
                <path d="M320,27 C309,22 298,27 292,21 C286,15 288,6 296,4
                          C305,2 312,9 310,18 C308,25 300,27 298,22"/>
                <path d="M292,21 Q287,13 292,6"/>
                <path d="M300,22 Q295,16 298,10"/>
                <!-- Extra left leaf -->
                <path d="M360,52 Q354,44 356,36"/>
                <path d="M368,54 Q365,45 370,38"/>

                <!-- Right main branch (mirror) -->
                <path d="M400,58 C414,54 430,60 446,54 C462,48 472,36 468,27
                          C464,18 452,18 446,25 C440,32 444,44 436,48 C428,52 416,50 406,55"/>
                <!-- Right branch detail leaves -->
                <path d="M446,54 Q453,43 449,34"/>
                <path d="M460,46 Q468,39 465,30"/>
                <path d="M436,48 Q434,37 425,33"/>
                <!-- Right far scroll -->
                <path d="M468,27 C479,22 490,27 496,21 C502,15 500,6 492,4
                          C483,2 476,9 478,18 C480,25 488,27 490,22"/>
                <path d="M496,21 Q501,13 496,6"/>
                <path d="M488,22 Q493,16 490,10"/>
                <!-- Extra right leaf -->
                <path d="M428,52 Q434,44 432,36"/>
                <path d="M420,54 Q423,45 418,38"/>

                <!-- Lower left tendrils -->
                <path d="M374,60 Q366,68 360,78 Q355,86 358,92"/>
                <path d="M362,80 Q354,82 350,90"/>
                <!-- Lower right tendrils -->
                <path d="M414,60 Q422,68 428,78 Q433,86 430,92"/>
                <path d="M426,80 Q434,82 438,90"/>
            </g>

            <!-- ══════════════ BOTTOM FOLD LINES ══════════════ -->
            <line x1="68"  y1="410" x2="394" y2="248"
                  stroke="#cec6b8" stroke-width="1.0"/>
            <line x1="720" y1="410" x2="394" y2="248"
                  stroke="#cec6b8" stroke-width="1.0"/>

            <!-- ══════════════ EVENT DETAILS ══════════════ -->

            <!-- Top accent rule -->
            <line x1="210" y1="184" x2="578" y2="184"
                  stroke="#c8c0b0" stroke-width="0.7"/>
            <circle cx="394" cy="184" r="3" fill="#c8c0b0"/>

            <!-- "SASE Banquet" — main script title -->
            <text x="394" y="234" text-anchor="middle"
                  font-family="'Great Vibes', cursive"
                  font-size="50" fill="#2c2018">SASE Banquet</text>

            <!-- "Friendship Gardens" — script subtitle in blue -->
            <text x="394" y="275" text-anchor="middle"
                  font-family="'Great Vibes', cursive"
                  font-size="32" fill="#4a6e8a">Friendship Gardens</text>

            <!-- Diamond divider -->
            <line x1="240" y1="292" x2="378" y2="292"
                  stroke="#c8c0b0" stroke-width="0.7"/>
            <path d="M394,287 L400,292 L394,297 L388,292 Z" fill="#c8c0b0"/>
            <line x1="410" y1="292" x2="548" y2="292"
                  stroke="#c8c0b0" stroke-width="0.7"/>

            <!-- Location -->
            <text x="394" y="316" text-anchor="middle"
                  font-family="'Cormorant Garamond', Georgia, serif"
                  font-size="14" fill="#5c4a38">
                Student Pavilion · Senita Ballroom BC
            </text>

            <!-- Date + Time -->
            <text x="394" y="338" text-anchor="middle"
                  font-family="'Cormorant Garamond', Georgia, serif"
                  font-size="14" fill="#5c4a38">
                April 18<tspan baseline-shift="super" font-size="9">th</tspan>,
                2026 &nbsp;·&nbsp; 5:00 – 8:00 PM
            </text>

            <!-- Dress + RSVP -->
            <text x="394" y="360" text-anchor="middle"
                  font-family="'Cormorant Garamond', Georgia, serif"
                  font-size="12.5" font-style="italic" fill="#8a7a68">
                Semi-formal &nbsp;·&nbsp; Must RSVP
            </text>

            <!-- Bottom accent rule -->
            <line x1="210" y1="376" x2="578" y2="376"
                  stroke="#c8c0b0" stroke-width="0.7"/>
            <circle cx="394" cy="376" r="3" fill="#c8c0b0"/>

            <!-- ══════════════ SHINE LAYERS ══════════════ -->

            <!-- 1. Always-on diagonal laminate sheen -->
            <rect x="0" y="0" width="720" height="410"
                  fill="url(#gloss-static)"
                  clip-path="url(#card-clip)"
                  pointer-events="none"/>

            <!-- 2. Mouse-tracking radial spotlight (JS updates cx/cy) -->
            <rect id="gloss-overlay"
                  x="0" y="0" width="720" height="410"
                  fill="url(#shine-radial)"
                  clip-path="url(#card-clip)"
                  pointer-events="none"/>

            <!-- 3. Hover sweep (CSS animation) -->
            <rect class="sweep-rect"
                  x="0" y="0" width="720" height="410"
                  fill="url(#sweep-grad)"
                  clip-path="url(#card-clip)"
                  pointer-events="none"/>

        </svg>
    </div><!-- /.envelope-card -->

    <a href="#rsvp" class="rsvp-btn">RSVP Now</a>

    <div class="scroll-hint">↓ &nbsp; scroll</div>

</section><!-- /#hero -->

<script>
/*
 * ENVELOPE CARD INTERACTIVITY
 * ─────────────────────────────────────────────────────
 *  • Mouse-tracking 3-D tilt  (rotateX / rotateY)
 *  • Radial shine spotlight   (SVG radialGradient cx/cy)
 *  • Dynamic shadow shift     (drop-shadow follows tilt)
 *  • Smooth return on leave   (CSS transition re-enabled)
 */
(function () {
    const card  = document.getElementById('envelopeCard');
    const shine = document.getElementById('shine-radial');

    const REST_TRANSFORM =
        'perspective(1100px) rotateX(5deg) rotateY(-8deg) rotateZ(-1deg)';
    const REST_FILTER =
        'drop-shadow(18px 26px 40px rgba(60,40,20,0.22)) ' +
        'drop-shadow(4px  8px  14px rgba(60,40,20,0.13))';
    const SLOW_TRANSITION =
        'transform 0.55s cubic-bezier(0.25,0.8,0.25,1), filter 0.55s ease';

    card.addEventListener('mouseenter', function () {
        /* Remove transition while tracking for instant response */
        card.style.transition = 'filter 0.12s ease';
    });

    card.addEventListener('mousemove', function (e) {
        const r = card.getBoundingClientRect();
        const x = (e.clientX - r.left) / r.width;   // 0–1
        const y = (e.clientY - r.top)  / r.height;  // 0–1

        /*
         * Tilt toward the mouse:
         *   rotateX  — positive = top tilts away  (when mouse at bottom)
         *   rotateY  — positive = right tilts toward (when mouse at right)
         */
        const rX = (5  + (y - 0.5) * -12).toFixed(1);
        const rY = (-8 + (x - 0.5) *  20).toFixed(1);

        card.style.transform =
            `perspective(1100px) rotateX(${rX}deg) rotateY(${rY}deg) rotateZ(-1deg)`;

        /* Shine spotlight follows cursor */
        shine.setAttribute('cx', (x * 100).toFixed(1) + '%');
        shine.setAttribute('cy', (y * 100).toFixed(1) + '%');

        /* Shadow shifts opposite to tilt (light source stays fixed) */
        const sX = (8  + x * 20).toFixed(0);
        const sY = (14 + y * 18).toFixed(0);
        card.style.filter =
            `drop-shadow(${sX}px ${sY}px 38px rgba(60,40,20,0.25)) ` +
            `drop-shadow(3px 6px 12px rgba(60,40,20,0.13))`;
    });

    card.addEventListener('mouseleave', function () {
        /* Re-enable slow transition and snap back to rest pose */
        card.style.transition = SLOW_TRANSITION;
        card.style.transform  = REST_TRANSFORM;
        card.style.filter     = REST_FILTER;
        shine.setAttribute('cx', '50%');
        shine.setAttribute('cy', '50%');
    });
}());
</script>

</body>
</html>
