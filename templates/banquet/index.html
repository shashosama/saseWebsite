{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SASE Annual Banquet 2026 — Friendship Gardens</title>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,400&family=Cinzel:wght@400;600&display=swap"
          rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #f0ece3;
            font-family: 'Cormorant Garamond', Georgia, serif;
            overflow-x: hidden;
        }

        /* ═══════════════════════════
           FALLING PETALS
           ═══════════════════════════ */
        .petal-canvas {
            position: fixed;
            inset: 0;
            pointer-events: none;
            overflow: hidden;
            z-index: 9999;
        }
        .petal {
            position: absolute;
            top: -40px;
            width: 14px;
            height: 12px;
            background: radial-gradient(ellipse at 40% 35%,
                #ffc2d4 0%, #ffadc4 55%, rgba(255,140,180,0.0) 100%);
            border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
            opacity: 0;
            animation: petal-fall linear infinite;
            transform-origin: center;
        }
        @keyframes petal-fall {
            0%   { opacity: 0;    transform: translateY(0)     rotate(0deg)   translateX(0); }
            8%   { opacity: 0.85; }
            90%  { opacity: 0.6;  }
            100% { opacity: 0;    transform: translateY(110vh) rotate(540deg) translateX(60px); }
        }

        /* ═══════════════════════════
           HERO
           ═══════════════════════════ */
        .hero {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 48px 24px 80px;
            position: relative;
        }
        .hero::before {
            content: '';
            position: absolute;
            inset: 0;
            background:
                radial-gradient(ellipse 60% 55% at 68% 48%, rgba(160,190,215,0.13) 0%, transparent 70%),
                radial-gradient(ellipse 50% 45% at 28% 75%, rgba(190,175,155,0.10) 0%, transparent 60%);
            pointer-events: none;
        }

        .hero-heading {
            text-align: center;
            margin-bottom: 0px;
            z-index: 5;
        }
        .hero-heading h1 {
            font-family: 'Cinzel', serif;
            font-size: clamp(13px, 2.2vw, 22px);
            font-weight: 400;
            color: #6a5a48;
            letter-spacing: 0.28em;
            text-transform: uppercase;
        }
        .hero-heading .tagline {
            font-family: 'Great Vibes', cursive;
            font-size: clamp(34px, 5.5vw, 58px);
            color: #4a6e8a;
            margin-top: 2px;
            line-height: 1.1;
        }

        /* ═══════════════════════════
           ENVELOPE CARD
           ═══════════════════════════ */
        .envelope-card {
            position: relative;
            width: 100%;
            max-width: 680px;
            z-index: 10;
            transform: perspective(1100px) rotateX(5deg) rotateY(-8deg) rotateZ(-1deg);
            filter:
                drop-shadow(18px 26px 40px rgba(60, 40, 20, 0.22))
                drop-shadow(4px  8px  14px rgba(60, 40, 20, 0.13));
            transition:
                transform 0.55s cubic-bezier(0.25, 0.8, 0.25, 1),
                filter    0.55s ease;
            cursor: pointer;
        }
        .envelope-card svg {
            display: block;
            width: 100%;
            height: auto;
            overflow: visible;
        }
        @keyframes card-sweep {
            from { transform: skewX(-18deg) translateX(-800px); }
            to   { transform: skewX(-18deg) translateX(1600px); }
        }
        .sweep-rect { transform: skewX(-18deg) translateX(-800px); }
        .envelope-card:hover .sweep-rect {
            animation: card-sweep 0.85s cubic-bezier(0.4, 0, 0.2, 1) forwards;
            animation-delay: 0.04s;
        }

        .rsvp-btn {
            display: inline-block;
            margin-top: 42px;
            padding: 13px 46px;
            background: transparent;
            border: 1.5px solid #4a6e8a;
            color: #4a6e8a;
            font-family: 'Cinzel', serif;
            font-size: 12px;
            letter-spacing: 0.25em;
            text-transform: uppercase;
            text-decoration: none;
            border-radius: 2px;
            z-index: 5;
            transition: background 0.3s, color 0.3s;
        }
        .rsvp-btn:hover { background: #4a6e8a; color: #fff; }

        .scroll-hint {
            position: absolute;
            bottom: 26px;
            left: 50%;
            transform: translateX(-50%);
            font-family: 'Cinzel', serif;
            font-size: 9px;
            letter-spacing: 0.3em;
            color: #b0a090;
            text-transform: uppercase;
            animation: bob 2.2s ease-in-out infinite;
        }
        @keyframes bob {
            0%, 100% { transform: translateX(-50%) translateY(0);   }
            50%       { transform: translateX(-50%) translateY(7px); }
        }

        /* ═══════════════════════════
           INVITED SECTION
           ═══════════════════════════ */
        .invited-section {
            position: relative;
            min-height: 180vh;
        }
        .invited-inner {
            position: sticky;
            top: 0;
            height: 100vh;
            overflow: hidden;
            background: #f0ece3;
        }
        .invited-inner::before {
            content: '';
            position: absolute;
            inset: 0;
            background:
                radial-gradient(ellipse 55% 50% at 32% 58%, rgba(190,175,155,0.10) 0%, transparent 65%),
                radial-gradient(ellipse 45% 50% at 72% 38%, rgba(160,190,215,0.09) 0%, transparent 60%);
            pointer-events: none;
        }

        .invited-watermark {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate3d(-50%, -50%, 0);
            font-family: 'Great Vibes', cursive;
            font-size: clamp(64px, 12vw, 144px);
            color: rgba(74, 110, 138, 0.07);
            white-space: nowrap;
            pointer-events: none;
            z-index: 1;
            will-change: transform;
        }

        /* ── Lacy card — now a relative container so the overlay sits inside it ── */
        .lacy-card {
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate3d(-60%, -50%, 0);
            width: clamp(230px, 27vw, 350px);
            z-index: 3;
            will-change: transform;
            filter: drop-shadow(0 22px 48px rgba(60, 40, 20, 0.18))
                    drop-shadow(0 4px 12px rgba(60, 40, 20, 0.10));
        }

        /* The lacy SVG sits at the bottom of the stack */
        .lacy-img {
            width: 100%;
            height: auto;
            display: block;
        }

        /* ── Screenshot overlaid on the lacy card ── */
        .lacy-overlay {
            position: absolute;
            /* inset with padding so it sits inside the lacy border */
            top: 8%;
            left: 8%;
            width: 84%;
            height: 84%;
            object-fit: cover;
            object-position: top center;
            /* multiply blends the cream bg of the screenshot into the lacy card */
            mix-blend-mode: multiply;
            opacity: 0.92;
            pointer-events: none;
        }

        /* ── Polaroid ── */
        .polaroid {
            position: absolute;
            left: 9%;
            top: 50%;
            transform: translate3d(0, -46%, 0) rotate(-5deg);
            will-change: transform;
            width: clamp(170px, 20vw, 260px);
            background: #fefdf9;
            padding: 8px 8px 28px;
            box-shadow:
                3px 6px 26px rgba(60, 40, 20, 0.18),
                0 0 0 1px rgba(200, 192, 180, 0.22);
            z-index: 4;
        }
        .polaroid-photo {
            width: 100%;
            aspect-ratio: 3 / 4;
            overflow: hidden;
            position: relative;
            background: #ede8df;
        }
        .polaroid-photo img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: top center;
            display: block;
        }
        .polaroid-cap {
            font-family: 'Cormorant Garamond', Georgia, serif;
            font-size: 10px;
            font-style: italic;
            color: #9a8a78;
            text-align: center;
            margin-top: 9px;
            letter-spacing: 0.03em;
        }

        /* ── Digital Camera ── */
        .camera-wrap {
            position: absolute;
            right: 9%;
            top: 46%;
            transform: translate3d(0, -50%, 0) rotate(5deg);
            will-change: transform;
            width: clamp(160px, 22vw, 300px);
            z-index: 4;
        }
        .camera-svg {
            width: 100%;
            height: auto;
            filter: drop-shadow(4px 10px 24px rgba(60, 40, 20, 0.14));
        }

        @media (max-width: 640px) {
            .lacy-card   { left: 50%; width: 78vw; }
            .polaroid    { left: 5%; top: 30%; }
            .camera-wrap { right: 4%; top: 68%; }
        }
    </style>
</head>
<body>

<!-- Falling petals -->
<div class="petal-canvas" id="petalCanvas" aria-hidden="true"></div>

<!-- ═══════════════════════════════════════════════════════
     HERO SECTION
     ═══════════════════════════════════════════════════════ -->
<section class="hero" id="hero">

    <div class="hero-heading">
        <h1>SASE Annual Banquet &nbsp;·&nbsp; 2026</h1>
        <p class="tagline">Friendship Gardens</p>
    </div>

    <div class="envelope-card" id="envelopeCard">
        <svg viewBox="0 0 720 720" xmlns="http://www.w3.org/2000/svg"
             xmlns:xlink="http://www.w3.org/1999/xlink" overflow="visible">
            <defs>
                <radialGradient id="shine-radial" cx="50%" cy="50%" r="55%"
                                gradientUnits="objectBoundingBox">
                    <stop offset="0%"   stop-color="#fffff5" stop-opacity="0.55"/>
                    <stop offset="38%"  stop-color="#fffff5" stop-opacity="0.16"/>
                    <stop offset="100%" stop-color="#fffff5" stop-opacity="0"/>
                </radialGradient>
                <linearGradient id="sweep-grad" x1="0%" y1="0%" x2="100%" y2="0%">
                    <stop offset="0%"   stop-color="white" stop-opacity="0"/>
                    <stop offset="43%"  stop-color="white" stop-opacity="0"/>
                    <stop offset="50%"  stop-color="white" stop-opacity="0.65"/>
                    <stop offset="57%"  stop-color="white" stop-opacity="0"/>
                    <stop offset="100%" stop-color="white" stop-opacity="0"/>
                </linearGradient>
                <linearGradient id="gloss-static" x1="15%" y1="0%" x2="72%" y2="100%">
                    <stop offset="0%"   stop-color="white" stop-opacity="0.42"/>
                    <stop offset="30%"  stop-color="white" stop-opacity="0.16"/>
                    <stop offset="50%"  stop-color="white" stop-opacity="0.04"/>
                    <stop offset="100%" stop-color="black" stop-opacity="0.06"/>
                </linearGradient>
                <linearGradient id="holo-foil" gradientUnits="userSpaceOnUse"
                                x1="0" y1="180" x2="720" y2="540">
                    <stop offset="0%"   stop-color="#d4af37" stop-opacity="0.00"/>
                    <stop offset="28%"  stop-color="#d4af37" stop-opacity="0.00"/>
                    <stop offset="34%"  stop-color="#d4af37" stop-opacity="0.30"/>
                    <stop offset="39%"  stop-color="#48c9b0" stop-opacity="0.26"/>
                    <stop offset="44%"  stop-color="#c39bd3" stop-opacity="0.24"/>
                    <stop offset="49%"  stop-color="#7fb3d3" stop-opacity="0.26"/>
                    <stop offset="54%"  stop-color="#f9e79f" stop-opacity="0.22"/>
                    <stop offset="60%"  stop-color="#f9e79f" stop-opacity="0.00"/>
                    <stop offset="100%" stop-color="#f9e79f" stop-opacity="0.00"/>
                </linearGradient>
                <mask id="envelope-mask" maskUnits="userSpaceOnUse" style="mask-type: alpha">
                    <image href="{% static 'banquet/envelope.svg' %}"
                           x="0" y="0" width="720" height="720"
                           preserveAspectRatio="xMidYMid meet"/>
                </mask>
            </defs>

            <image href="{% static 'banquet/envelope.svg' %}"
                   x="0" y="0" width="720" height="720"
                   preserveAspectRatio="xMidYMid meet"/>

            <line x1="180" y1="310" x2="540" y2="310" stroke="#c0b4a4" stroke-width="0.8"/>
            <circle cx="360" cy="310" r="3.5" fill="#c0b4a4"/>

            <text x="360" y="368" text-anchor="middle"
                  font-family="'Great Vibes', cursive" font-size="52" fill="#2c2018">SASE Banquet</text>

            <text x="360" y="413" text-anchor="middle"
                  font-family="'Great Vibes', cursive" font-size="34" fill="#4a6e8a">Friendship Gardens</text>

            <line x1="210" y1="432" x2="346" y2="432" stroke="#c0b4a4" stroke-width="0.7"/>
            <path d="M360,427 L366,432 L360,437 L354,432 Z" fill="#c0b4a4"/>
            <line x1="374" y1="432" x2="510" y2="432" stroke="#c0b4a4" stroke-width="0.7"/>

            <text x="360" y="458" text-anchor="middle"
                  font-family="'Cormorant Garamond', Georgia, serif" font-size="14.5" fill="#4a3828">
                Student Pavilion · Senita Ballroom BC
            </text>
            <text x="360" y="482" text-anchor="middle"
                  font-family="'Cormorant Garamond', Georgia, serif" font-size="14.5" fill="#4a3828">
                April 18<tspan baseline-shift="super" font-size="9">th</tspan>,
                2026 &nbsp;·&nbsp; 5:00 – 8:00 PM
            </text>
            <text x="360" y="506" text-anchor="middle"
                  font-family="'Cormorant Garamond', Georgia, serif"
                  font-size="13" font-style="italic" fill="#7a6a58">
                Semi-formal &nbsp;·&nbsp; Must RSVP
            </text>

            <line x1="180" y1="524" x2="540" y2="524" stroke="#c0b4a4" stroke-width="0.8"/>
            <circle cx="360" cy="524" r="3.5" fill="#c0b4a4"/>

            <rect x="0" y="0" width="720" height="720"
                  fill="url(#gloss-static)" mask="url(#envelope-mask)" pointer-events="none"/>
            <rect x="0" y="0" width="720" height="720"
                  fill="url(#holo-foil)"   mask="url(#envelope-mask)" pointer-events="none"/>
            <rect id="gloss-overlay" x="0" y="0" width="720" height="720"
                  fill="url(#shine-radial)" mask="url(#envelope-mask)" pointer-events="none"/>
            <rect class="sweep-rect" x="0" y="0" width="720" height="720"
                  fill="url(#sweep-grad)" mask="url(#envelope-mask)" pointer-events="none"/>
        </svg>
    </div>

    <a href="#rsvp" class="rsvp-btn">RSVP Now</a>
    <div class="scroll-hint">↓ &nbsp; scroll</div>

</section>

<!-- ═══════════════════════════════════════════════════════
     INVITED SECTION
     ═══════════════════════════════════════════════════════ -->
<section class="invited-section" id="invited">
<div class="invited-inner">

    <div class="invited-watermark" aria-hidden="true">You Are Invited</div>

    <!--
        Lacy card + screenshot overlay stacked inside the same container.
        The screenshot uses mix-blend-mode: multiply so its cream background
        blends into the lacy SVG beneath it, making them look like one object.
    -->
    <div class="lacy-card" aria-label="You are invited">
        <!-- base layer: lacy border artwork -->
        <img src="{% static 'banquet/images/lacy invatation card.svg' %}"
             alt="You Are Invited" class="lacy-img">

        <!-- overlay layer: the invitation screenshot -->
        <img src="{% static 'banquet/images/Screenshot 2026-03-20 004549.png' %}"
             alt="" class="lacy-overlay" aria-hidden="true">
    </div>

    <!-- Polaroid: screenshot used as the photo inside -->
    <div class="polaroid">
        <div class="polaroid-photo">
            <img src="{% static 'banquet/images/Screenshot 2026-03-20 004549.png' %}"
                 alt="SASE Banquet Invitation">
        </div>
        <p class="polaroid-cap">/ sase banquet 2026</p>
    </div>

    <div class="camera-wrap">
        <img src="{% static 'banquet/images/camera.svg' %}"
             alt="" class="camera-svg" aria-hidden="true">
    </div>

</div>
</section>

<script>
/* ── Petals ── */
(function () {
    const canvas = document.getElementById('petalCanvas');
    for (let i = 0; i < 28; i++) {
        const p = document.createElement('div');
        p.className = 'petal';
        const size = (10 + Math.random() * 8).toFixed(1);
        p.style.cssText =
            `left:${(Math.random() * 100).toFixed(1)}%;` +
            `width:${size}px; height:${(parseFloat(size) * 0.85).toFixed(1)}px;` +
            `animation-duration:${(8 + Math.random() * 12).toFixed(2)}s;` +
            `animation-delay:-${(Math.random() * 20).toFixed(2)}s;`;
        canvas.appendChild(p);
    }
}());

/* ── Envelope card 3-D tilt + shine ── */
(function () {
    const card  = document.getElementById('envelopeCard');
    const shine = document.getElementById('shine-radial');
    const foil  = document.getElementById('holo-foil');

    const REST_TRANSFORM =
        'perspective(1100px) rotateX(5deg) rotateY(-8deg) rotateZ(-1deg)';
    const REST_FILTER =
        'drop-shadow(18px 26px 40px rgba(60,40,20,0.22)) ' +
        'drop-shadow(4px  8px  14px rgba(60,40,20,0.13))';
    const SLOW_TRANSITION =
        'transform 0.55s cubic-bezier(0.25,0.8,0.25,1), filter 0.55s ease';

    card.addEventListener('mouseenter', () => {
        card.style.transition = 'filter 0.12s ease';
    });

    card.addEventListener('mousemove', (e) => {
        const r  = card.getBoundingClientRect();
        const x  = (e.clientX - r.left) / r.width;
        const y  = (e.clientY - r.top)  / r.height;
        const rX = (5  + (y - 0.5) * -12).toFixed(1);
        const rY = (-8 + (x - 0.5) *  20).toFixed(1);

        card.style.transform =
            `perspective(1100px) rotateX(${rX}deg) rotateY(${rY}deg) rotateZ(-1deg)`;

        shine.setAttribute('cx', (x * 100).toFixed(1) + '%');
        shine.setAttribute('cy', (y * 100).toFixed(1) + '%');

        const tilt = (45 + parseFloat(rY) * 1.8 + parseFloat(rX) * 0.6) * Math.PI / 180;
        const r2 = 390;
        foil.setAttribute('x1', (360 - r2 * Math.cos(tilt)).toFixed(0));
        foil.setAttribute('y1', (360 + r2 * Math.sin(tilt)).toFixed(0));
        foil.setAttribute('x2', (360 + r2 * Math.cos(tilt)).toFixed(0));
        foil.setAttribute('y2', (360 - r2 * Math.sin(tilt)).toFixed(0));

        const sX = (8  + x * 20).toFixed(0);
        const sY = (14 + y * 18).toFixed(0);
        card.style.filter =
            `drop-shadow(${sX}px ${sY}px 38px rgba(60,40,20,0.25)) ` +
            `drop-shadow(3px 6px 12px rgba(60,40,20,0.13))`;
    });

    card.addEventListener('mouseleave', () => {
        card.style.transition = SLOW_TRANSITION;
        card.style.transform  = REST_TRANSFORM;
        card.style.filter     = REST_FILTER;
        shine.setAttribute('cx', '50%'); shine.setAttribute('cy', '50%');
        foil.setAttribute('x1', '0');   foil.setAttribute('y1', '180');
        foil.setAttribute('x2', '720'); foil.setAttribute('y2', '540');
    });
}());

/* ── Invited section depth parallax ── */
(function () {
    const section   = document.getElementById('invited');
    if (!section) return;

    const watermark = section.querySelector('.invited-watermark');
    const lacy      = section.querySelector('.lacy-card');
    const polaroid  = section.querySelector('.polaroid');
    const camera    = section.querySelector('.camera-wrap');

    let rafId = null;

    function update() {
        rafId = null;
        const scrolled = Math.max(0, -section.getBoundingClientRect().top);

        /* BG layer — slow drift */
        const bgY = -(scrolled * 0.12);
        watermark.style.transform = `translate3d(-50%, calc(-50% + ${bgY.toFixed(1)}px), 0)`;
        lacy.style.transform      = `translate3d(-60%, calc(-50% + ${bgY.toFixed(1)}px), 0)`;

        /* FG layer — faster drift */
        const polY = -(scrolled * 0.40);
        polaroid.style.transform  = `translate3d(0, calc(-46% + ${polY.toFixed(1)}px), 0) rotate(-5deg)`;
        camera.style.transform    = `translate3d(0, calc(-50% + ${polY.toFixed(1)}px), 0) rotate(5deg)`;
    }

    function onScroll() { if (!rafId) rafId = requestAnimationFrame(update); }
    window.addEventListener('scroll', onScroll, { passive: true });
    window.addEventListener('resize', onScroll, { passive: true });
    update();
}());
</script>

</body>
</html>
