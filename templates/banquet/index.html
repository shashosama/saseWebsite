<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Annual Banquet</title>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #e8eba8;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* ─── Banner wrapper ─── */
        .banner-wrapper {
            width: 100%;
            max-width: 1200px;
            position: relative;
        }
        .banner-wrapper > svg {
            display: block;
            width: 100%;
            height: auto;
        }

        /* ─── "Annual Banquet" text ─── */
        .text-bg {
            position: absolute;
            left: 4%; top: 36%;
            width: 20%; height: 28%;
            background: rgba(180, 210, 185, 0.22);
            border-radius: 4px;
            pointer-events: none;
        }
        .text-overlay {
            position: absolute;
            left: 6%; top: 50%;
            transform: translateY(-50%);
            font-family: 'Great Vibes', cursive;
            font-size: clamp(26px, 4.8vw, 56px);
            color: #2a7a7a;
            line-height: 1.25;
            pointer-events: none;
            z-index: 10;
        }

        /* ══════════════════════════════════════════════════
           ENVELOPE CARD — 3-D float + shine
           ══════════════════════════════════════════════════ */
        .envelope-card {
            position: absolute;
            left: 42%; top: 50%;
            width: 52%;

            /* Default tilt — overridden by JS on mousemove */
            transform: translateY(-50%)
                       perspective(900px)
                       rotateX(6deg)
                       rotateY(-10deg)
                       rotateZ(-2deg);

            /* Cast shadow */
            filter: drop-shadow(12px 20px 30px rgba(80, 60, 20, 0.30))
                    drop-shadow(3px  6px  10px rgba(80, 60, 20, 0.16));

            /* Smooth return-to-rest transition (active only on mouse-leave) */
            transition: transform 0.5s cubic-bezier(0.25, 0.8, 0.25, 1),
                        filter   0.5s ease;

            cursor: pointer;
            z-index: 20;
        }

        .envelope-card svg {
            display: block;
            width: 100%;
            height: auto;
            overflow: visible; /* flap + branches bleed outside */
        }

        /* ──────────────────────────────────────
           SWEEP SHINE — diagonal light on hover
           ────────────────────────────────────── */
        @keyframes shine-sweep {
            from { transform: translateX(-500px); }
            to   { transform: translateX(1000px); }
        }

        /* The sweep rect sits in SVG and is targeted via class */
        .sweep-overlay {
            /* Off-screen left by default */
            transform: translateX(-500px);
        }
        .envelope-card:hover .sweep-overlay {
            /* Slide across once, stay off-screen right */
            animation: shine-sweep 0.75s cubic-bezier(0.4, 0, 0.2, 1) 1 forwards;
            animation-delay: 0.05s;
        }
    </style>
</head>

    <div class="envelope-card" id="envelopeCard">

                <!--
                    SHINE GRADIENTS
                    ────────────────
                    1. shine-radial  — mouse-tracking spotlight (JS updates cx/cy)
                    2. shine-sweep   — diagonal band for the hover-sweep effect
                -->

                <!-- 1. Radial spotlight — centre tracks the mouse -->
                <radialGradient id="shine-radial" cx="50%" cy="50%" r="55%"
                                gradientUnits="objectBoundingBox">

                    <stop offset="35%"  stop-color="#fffff0" stop-opacity="0.18"/>
                    <stop offset="100%" stop-color="#fffff0" stop-opacity="0"/>

                <!-- 2. Diagonal sweep band -->

                    <stop offset="35%"  stop-color="white" stop-opacity="0"/>
                    <stop offset="47%"  stop-color="white" stop-opacity="0.55"/>
                    <stop offset="50%"  stop-color="white" stop-opacity="0.75"/>
                    <stop offset="53%"  stop-color="white" stop-opacity="0.55"/>
                    <stop offset="65%"  stop-color="white" stop-opacity="0"/>

<script>
/*
 * Two interactive effects on the envelope card:
 *
 *  1. DYNAMIC TILT  — card rotates toward wherever the mouse is
 *     (replaces the static CSS transform while hovering)
 *
 *  2. RADIAL GLOSS  — a warm spotlight follows the cursor,
 *     implemented by updating the SVG radialGradient cx/cy in real time
 */
(function () {
    const card       = document.getElementById('envelopeCard');
    const shineGrad  = document.getElementById('shine-radial');

    /* Default transform used when not hovering */
    const DEFAULT_TRANSFORM =
        'translateY(-50%) perspective(900px) rotateX(6deg) rotateY(-10deg) rotateZ(-2deg)';
    const SMOOTH_TRANSITION =
        'transform 0.5s cubic-bezier(0.25,0.8,0.25,1), filter 0.5s ease';

    card.addEventListener('mouseenter', function () {
        /* During tracking we want instant response, so remove the transition */
        card.style.transition = 'filter 0.12s ease';
    });

    card.addEventListener('mousemove', function (e) {
        const rect  = card.getBoundingClientRect();
        const xRatio = (e.clientX - rect.left)  / rect.width;   // 0 → 1
        const yRatio = (e.clientY - rect.top)   / rect.height;  // 0 → 1

        /* ── 1. Dynamic tilt ──
           Mouse on the right edge  → more rotateY (right tilts away)
           Mouse on the bottom edge → more rotateX (bottom tilts away)     */
        const rotY = -10 + (xRatio - 0.5) * -18;  // approx −19 to −1 °
        const rotX =   6 + (yRatio - 0.5) *  12;  // approx   0 to 12 °
        card.style.transform =
            `translateY(-50%) perspective(900px) ` +
            `rotateX(${rotY.toFixed(1)}deg) ` +
            `rotateY(${rotX.toFixed(1)}deg) ` +
            `rotateZ(-2deg)`;

        /* ── 2. Radial gloss — move the spotlight ── */
        shineGrad.setAttribute('cx', (xRatio * 100).toFixed(1) + '%');
        shineGrad.setAttribute('cy', (yRatio * 100).toFixed(1) + '%');

        /* Intensify the shadow slightly toward the bottom to follow tilt */
        const shadowY = 20 + yRatio * 16;
        const shadowX = 12 + xRatio * 10;
        card.style.filter =
            `drop-shadow(${shadowX}px ${shadowY}px 32px rgba(80,60,20,0.32)) ` +
            `drop-shadow(3px 6px 10px rgba(80,60,20,0.16))`;
    });

    card.addEventListener('mouseleave', function () {
        /* Re-enable smooth transition and snap back to the resting pose */
        card.style.transition = SMOOTH_TRANSITION;
        card.style.transform  = DEFAULT_TRANSFORM;
        card.style.filter     =
            'drop-shadow(12px 20px 30px rgba(80,60,20,0.30)) ' +
            'drop-shadow(3px 6px 10px rgba(80,60,20,0.16))';

        /* Reset spotlight to centre */
        shineGrad.setAttribute('cx', '50%');
        shineGrad.setAttribute('cy', '50%');
    });
}());
</script>
