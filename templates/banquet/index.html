{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Annual Banquet</title>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #c8dff0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .banner-wrapper {
            width: 100%;
            max-width: 1200px;
            position: relative;
        }

        .banner-wrapper > svg {
            display: block;
            width: 100%;
            height: auto;
        }

        .text-overlay {
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            font-family: 'Great Vibes', cursive;
            font-size: clamp(36px, 6vw, 72px);
            color: #3a6080;
            line-height: 1.25;
            text-align: center;
            pointer-events: none;
            z-index: 10;
        }
    </style>
</head>
<body>
    <div class="banner-wrapper">
        <svg viewBox="0 0 900 360" xmlns="http://www.w3.org/2000/svg">
            <rect width="900" height="360" fill="#c8dff0"/>
        </svg>
        <div class="text-overlay">
            Annual<br>Banquet
        </div>
    </div>
</body>
</html>
